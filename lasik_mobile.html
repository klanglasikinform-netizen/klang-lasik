<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>นัดตรวจตาเลสิก — รพ.กลาง</title>
<meta name="theme-color" content="#0a3d6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="นัดตรวจตา รพ.กลาง">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22%E0%B8%99%E0%B8%B1%E0%B8%94%E0%B8%95%E0%B8%A3%E0%B8%A7%E0%B8%88%E0%B8%95%E0%B8%B2%E0%B9%80%E0%B8%A5%E0%B8%AA%E0%B8%B4%E0%B8%81%22%2C%22short_name%22%3A%22%E0%B8%99%E0%B8%B1%E0%B8%94%E0%B8%95%E0%B8%A3%E0%B8%A7%E0%B8%88%E0%B8%95%E0%B8%B2%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f0f6ff%22%2C%22theme_color%22%3A%22%230a3d6b%22%7D">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#0a3d6b;--pl:#1565a8;--accent:#00b8d9;--a2:#e8f4fd;--teal:#009fa8;
  --ok:#22c55e;--err:#ef4444;--warn:#f59e0b;--purple:#7c3aed;
  --bg:#f0f6ff;--sur:#fff;--sur2:#f7faff;
  --tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;--bd:#cbd5e1;
  --sh:0 4px 24px rgba(10,61,107,0.10);--R:16px;--r:10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}

/* ===== MOBILE HEADER ===== */
.hdr{background:linear-gradient(135deg,var(--primary) 0%,#0d5799 55%,var(--teal) 100%);position:sticky;top:0;z-index:300;box-shadow:0 2px 20px rgba(10,61,107,0.22);}
.hdr-in{max-width:1160px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:60px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-ic{width:38px;height:38px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.logo-tx{color:#fff;}
.logo-tx h1{font-size:14px;font-weight:800;line-height:1.2;}
.logo-tx p{font-size:10.5px;opacity:.75;display:none;}
/* Hide desktop nav on mobile */
.nav{display:none;}
/* Mobile hamburger */
.hdr-menu-btn{background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);color:#fff;width:38px;height:38px;border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ===== BOTTOM NAV (MOBILE) ===== */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:var(--sur);border-top:1.5px solid var(--bd);
  display:flex;align-items:stretch;
  padding-bottom:var(--safe-bottom);
  box-shadow:0 -4px 20px rgba(10,61,107,0.10);
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 6px 8px;cursor:pointer;gap:3px;border:none;background:transparent;
  font-family:inherit;transition:all .2s;color:var(--tx3);position:relative;
}
.bnav-item.on{color:var(--primary);}
.bnav-item.on::after{content:'';position:absolute;top:0;left:20%;right:20%;height:3px;background:var(--primary);border-radius:0 0 4px 4px;}
.bnav-ic{font-size:22px;line-height:1;}
.bnav-lbl{font-size:11px;font-weight:600;}

/* ===== MAIN CONTENT ===== */
.main{max-width:1160px;margin:0 auto;padding:18px 14px 96px;}
.page{display:none;animation:fadeIn .2s ease;} .page.on{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ===== HERO (MOBILE) ===== */
.hero{
  background:linear-gradient(135deg,var(--primary),var(--pl));
  border-radius:18px;padding:22px 20px 24px;color:#fff;
  margin-bottom:20px;position:relative;overflow:hidden;
}
.hero::before{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.06);}
.hero::after{content:'';position:absolute;right:20px;bottom:-50px;width:130px;height:130px;border-radius:50%;background:rgba(0,184,217,0.12);}
.hero-t{font-size:20px;font-weight:800;margin-bottom:7px;position:relative;z-index:1;}
.hero-s{font-size:13.5px;opacity:.85;line-height:1.65;position:relative;z-index:1;margin-bottom:16px;}
.hero-btn{
  background:#fff;color:var(--primary);border:none;
  padding:12px 24px;border-radius:10px;font-size:14.5px;font-weight:700;
  cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;
  box-shadow:0 4px 14px rgba(0,0,0,0.15);position:relative;z-index:1;
  -webkit-appearance:none;
}
.hero-btn:active{transform:scale(0.97);}

/* ===== STEPPER (COMPACT MOBILE) ===== */
.stepper{
  display:flex;align-items:center;margin-bottom:20px;
  background:var(--sur);border-radius:14px;padding:14px 16px;
  box-shadow:var(--sh);overflow:hidden;
}
.stp{display:flex;align-items:center;gap:7px;flex:1;}
.stp-n{
  width:28px;height:28px;border-radius:50%;font-weight:700;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bd);color:var(--tx3);flex-shrink:0;transition:all .3s;
}
.stp.done .stp-n{background:var(--ok);color:#fff;}
.stp.act .stp-n{background:var(--primary);color:#fff;box-shadow:0 0 0 3px rgba(10,61,107,0.15);}
.stp-l{font-size:11.5px;color:var(--tx3);font-weight:500;white-space:nowrap;}
.stp.act .stp-l{color:var(--primary);font-weight:700;}
.stp.done .stp-l{color:var(--ok);}
.stp-line{flex:1;height:2px;background:var(--bd);margin:0 4px;border-radius:2px;}
.stp-line.done{background:var(--ok);}

/* ===== CARDS ===== */
.card{background:var(--sur);border-radius:var(--R);padding:18px 16px;box-shadow:var(--sh);margin-bottom:14px;}
.card-t{font-size:15.5px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

/* ===== FORMS ===== */
.fr{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px;}
.fr2mob{grid-template-columns:1fr 1fr;}
.fr3{grid-template-columns:1fr;}
.fr4{grid-template-columns:1fr 1fr;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:13px;font-weight:600;color:var(--tx2);}
.fg input,.fg select,.fg textarea{
  padding:12px 14px;border:1.5px solid var(--bd);border-radius:var(--r);
  font-size:16px;/* 16px prevents iOS zoom */
  font-family:inherit;color:var(--tx);background:var(--sur2);
  -webkit-appearance:none;outline:none;
  transition:border-color .2s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,184,217,0.12);}
.fg .em{font-size:11.5px;color:var(--err);display:none;}
.fg.err .em{display:block;} .fg.err input,.fg.err select{border-color:var(--err);}

/* ===== CHIPS ===== */
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip,.rchip{
  display:flex;align-items:center;gap:6px;cursor:pointer;
  background:var(--sur2);border:1.5px solid var(--bd);
  padding:9px 14px;border-radius:22px;font-size:14px;
  transition:all .15s;user-select:none;font-weight:500;
  -webkit-tap-highlight-color:transparent;
}
.chip input,.rchip input{display:none;}
.chip.on,.rchip.on{border-color:var(--primary);background:#e8f0fb;color:var(--primary);font-weight:700;}
.chip.dis,.rchip.dis{opacity:.4;cursor:not-allowed;pointer-events:none;}

/* ===== CALENDAR ===== */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-title{font-size:16px;font-weight:700;color:var(--primary);}
.cal-nav{display:flex;gap:6px;}
.cal-nav button{width:36px;height:36px;border:1.5px solid var(--bd);background:#fff;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--tx2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dn{text-align:center;font-size:12px;font-weight:700;color:var(--tx3);padding:5px 0;}
.cal-d{
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;border-radius:8px;cursor:pointer;font-size:13px;
  font-weight:500;border:1.5px solid transparent;transition:all .15s;position:relative;
  min-height:40px;
}
.cal-d.emp{pointer-events:none;}
.cal-d.na{color:var(--tx3);pointer-events:none;opacity:.3;}
.cal-d.hol{color:#dc2626;background:#fff0f0;pointer-events:none;opacity:.6;}
.cal-d.hol::after{content:'🎌';font-size:7px;position:absolute;top:2px;right:2px;}
.cal-d.av{background:var(--a2);color:var(--primary);}
.cal-d.av:active{background:var(--primary);color:#fff;}
.cal-d.sel{background:var(--primary);color:#fff;box-shadow:0 4px 10px rgba(10,61,107,0.25);}
.cal-d.tod:not(.sel){border-color:var(--accent);}
.dn{font-size:13px;font-weight:600;line-height:1;}
.dot{width:4px;height:4px;border-radius:50%;margin-top:2px;}
.cal-d.av .dot{background:var(--accent);}
.cal-d.sel .dot{background:rgba(255,255,255,.7);}
.cal-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:11.5px;color:var(--tx3);}
.cl-item{display:flex;align-items:center;gap:4px;}
.cl-dot{width:10px;height:10px;border-radius:3px;}

/* ===== TIME SLOT ===== */
.ts-box{border:2px solid var(--bd);border-radius:12px;padding:16px;background:var(--sur2);cursor:pointer;}
.ts-box.sel{border-color:var(--primary);background:#e8f0fb;}
.ts-box.full{opacity:.55;cursor:not-allowed;}
.ts-t{font-size:22px;font-weight:800;color:var(--primary);margin-bottom:3px;}
.ts-tag{display:inline-block;background:var(--a2);color:var(--teal);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;margin-bottom:7px;}
.ts-bar-w{height:8px;background:var(--bd);border-radius:4px;overflow:hidden;}
.ts-bar{height:100%;border-radius:4px;transition:width .3s;}
.bar-ok{background:var(--ok);} .bar-w{background:var(--warn);} .bar-f{background:var(--err);}
.ts-ct{font-size:12px;color:var(--tx3);margin-top:5px;}
.ts-st{font-size:12.5px;font-weight:700;margin-top:3px;}
.st-ok{color:var(--ok);} .st-w{color:var(--warn);} .st-f{color:var(--err);}

/* ===== CONSENT ===== */
.consent-box{background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:16px;margin-bottom:16px;}
.consent-box p{font-size:13px;line-height:1.8;color:#78350f;}
.consent-chk{display:flex;align-items:flex-start;gap:10px;margin-top:12px;cursor:pointer;}
.consent-chk input{width:20px;height:20px;accent-color:var(--primary);margin-top:1px;flex-shrink:0;}
.consent-chk span{font-size:13px;color:var(--tx);font-weight:500;}

/* ===== BUTTONS ===== */
.btn{
  padding:13px 22px;border-radius:10px;font-size:15px;font-weight:700;
  cursor:pointer;border:none;font-family:inherit;transition:all .15s;
  display:inline-flex;align-items:center;gap:7px;-webkit-appearance:none;
}
.btn:active{transform:scale(0.97);}
.btn-p{background:var(--primary);color:#fff;}
.btn-p:active{background:var(--pl);}
.btn-p:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.btn-o{background:transparent;color:var(--primary);border:2px solid var(--primary);}
.btn-d{background:var(--err);color:#fff;}
.btn-g{background:var(--ok);color:#fff;}
.btn-w{background:var(--warn);color:#fff;}
.btn-sm{padding:8px 14px;font-size:13px;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.btn-full{width:100%;justify-content:center;}

/* ===== SUMMARY ===== */
.sum-grid{display:grid;grid-template-columns:1fr;gap:12px;}
.sum-l{font-size:11px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.sum-v{font-size:14.5px;font-weight:600;color:var(--tx);}
.sum-div{grid-column:1/-1;border:none;border-top:1.5px solid var(--bd);}

/* ===== OVERLAYS / POPUPS ===== */
.ov{position:fixed;inset:0;background:rgba(10,20,50,.6);z-index:900;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.ov.on{display:flex;}
/* Bottom sheet on mobile */
.pop{
  background:var(--sur);border-radius:22px 22px 0 0;padding:28px 20px 32px;
  width:100%;max-width:100%;text-align:center;
  box-shadow:0 -8px 40px rgba(0,0,0,.2);
  animation:slideUp .3s ease;
  max-height:92vh;overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pop::before{content:'';display:block;width:40px;height:4px;background:var(--bd);border-radius:4px;margin:0 auto 18px;}
.pop-ic{font-size:48px;margin-bottom:12px;}
.pop h2{font-size:20px;font-weight:700;color:var(--primary);margin-bottom:9px;}
.pop p{font-size:14px;color:var(--tx2);line-height:1.7;margin-bottom:20px;}
.pop-ref{background:var(--a2);border-radius:10px;padding:10px 16px;font-size:17px;font-weight:700;color:var(--primary);letter-spacing:.06em;margin-bottom:16px;}

/* ===== ALERTS ===== */
.alert{padding:12px 14px;border-radius:10px;font-size:13.5px;margin-bottom:14px;line-height:1.6;}
.a-info{background:#e0f2fe;color:#0c4a6e;border:1px solid #7dd3fc;}
.a-warn{background:#fffbeb;color:#78350f;border:1px solid #fde68a;}
.a-ok{background:#dcfce7;color:#14532d;border:1px solid #86efac;}
.a-err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.section-note{background:var(--a2);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 13px;font-size:13px;color:var(--tx2);margin-bottom:13px;white-space:pre-line;}

/* ===== CHECK PAGE ===== */
.apt-card{background:var(--sur);border-radius:12px;border:1.5px solid var(--bd);padding:16px;margin-bottom:10px;}
.apt-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.apt-ref{font-size:11.5px;color:var(--tx3);}
.apt-st{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;}
.apt-st.pending{background:#fef3c7;color:#92400e;} .apt-st.confirmed{background:#d1fae5;color:#065f46;} .apt-st.cancelled{background:#fee2e2;color:#991b1b;} .apt-st.rescheduled{background:#ede9fe;color:#5b21b6;}
.apt-name{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:5px;}
.apt-info{font-size:13.5px;color:var(--tx2);line-height:1.8;}
.instr-card{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1.5px solid #86efac;border-radius:12px;padding:16px;margin-top:12px;}
.instr-card.surg{background:linear-gradient(135deg,#faf5ff,#ede9fe);border-color:#c4b5fd;}
.instr-title{font-size:13.5px;font-weight:700;color:#14532d;margin-bottom:9px;display:flex;align-items:center;gap:5px;}
.instr-card.surg .instr-title{color:#5b21b6;}
.instr-list{list-style:none;display:flex;flex-direction:column;gap:6px;}
.instr-list li{font-size:13px;color:var(--tx2);display:flex;align-items:flex-start;gap:6px;line-height:1.5;}
.instr-list li::before{content:'•';color:var(--ok);font-weight:700;flex-shrink:0;}
.instr-card.surg .instr-list li::before{color:var(--purple);}

/* ===== ADMIN ===== */
.adm-login{max-width:400px;margin:0 auto;}
.adm-hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.adm-av{width:46px;height:46px;background:var(--primary);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;}
.adm-hdr h2{font-size:18px;font-weight:700;color:var(--primary);}
.adm-hdr p{font-size:13px;color:var(--tx3);}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.dash-stat{background:var(--sur);border-radius:var(--R);padding:16px 12px;box-shadow:var(--sh);text-align:center;}
.dash-num{font-size:28px;font-weight:800;color:var(--primary);line-height:1;}
.dash-lbl{font-size:12px;color:var(--tx3);margin-top:4px;font-weight:500;}

/* Admin tabs — horizontal scroll on mobile */
.tabs{display:flex;border-bottom:2px solid var(--bd);margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 16px;font-size:13.5px;font-weight:600;cursor:pointer;color:var(--tx3);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);}
.table-w{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{background:var(--primary);color:#fff;padding:10px 10px;text-align:left;font-weight:600;white-space:nowrap;}
thead th:first-child{border-radius:8px 0 0 8px;} thead th:last-child{border-radius:0 8px 8px 0;}
tbody tr{border-bottom:1px solid var(--bd);}
tbody td{padding:9px 10px;color:var(--tx);vertical-align:middle;}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11.5px;font-weight:600;}
.b-pend{background:#fef3c7;color:#92400e;} .b-conf{background:#d1fae5;color:#065f46;} .b-canc{background:#fee2e2;color:#991b1b;} .b-res{background:#ede9fe;color:#5b21b6;}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.filter-bar select,.filter-bar input{padding:9px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;font-family:inherit;background:var(--sur);color:var(--tx);-webkit-appearance:none;outline:none;min-width:0;}

/* Toggle */
.tog-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);margin-bottom:12px;}
.tog{position:relative;width:46px;height:26px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;}
.tog-sl{position:absolute;inset:0;background:#ccc;border-radius:26px;cursor:pointer;transition:.3s;}
.tog-sl::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;}
.tog input:checked+.tog-sl{background:var(--primary);}
.tog input:checked+.tog-sl::before{transform:translateX(20px);}
.tog-lbl{font-size:13.5px;font-weight:600;color:var(--tx);}

/* Queue slot cards */
.qm-slot-card{background:var(--sur2);border:1.5px solid var(--bd);border-radius:var(--r);margin-bottom:12px;overflow:hidden;}
.qm-slot-card.closed{opacity:.6;}
.qm-slot-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:var(--sur);}
.qm-slot-time{font-size:15px;font-weight:800;color:var(--primary);}
.qm-slot-sub{font-size:12px;color:var(--tx3);margin-top:2px;}
.qm-slot-right{display:flex;align-items:center;gap:8px;}
.qm-open-badge{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;background:#dcfce7;color:#14532d;}
.qm-slot-card.closed .qm-open-badge{background:#fee2e2;color:#991b1b;}
.qm-slot-body{padding:13px 15px;border-top:1px solid var(--bd);}
.qm-slot-card.closed .qm-slot-body{display:none;}
.qm-controls{display:flex;align-items:center;gap:10px;}
.qm-num{font-size:22px;font-weight:800;color:var(--primary);min-width:30px;text-align:center;}
.qm-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sur);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit;font-weight:700;}
.qm-btn:active{background:var(--a2);}

/* Calendar admin (holiday + apt) */
.hol-cal-grid,.apt-month-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.hol-cal-grid{margin-bottom:8px;}
.hol-cal-dn,.apt-cal-dn{text-align:center;font-size:11px;font-weight:700;color:var(--tx3);padding:5px 0;}
.hol-cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:500;border:1.5px solid transparent;transition:all .15s;position:relative;}
.hol-cal-d.hol-day-on{background:#fff0f0;border-color:#fca5a5;color:#dc2626;font-weight:700;}
.hol-cal-d.hol-day-on::after{content:'🎌';font-size:6px;position:absolute;top:1px;right:2px;}
.hol-cal-d.today-hol{border-color:var(--accent);}
.hol-cal-legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11.5px;color:var(--tx3);}
.hol-leg-item{display:flex;align-items:center;gap:4px;}
.hol-upcoming{display:flex;flex-direction:column;gap:5px;max-height:160px;overflow-y:auto;}
.hol-up-item{display:flex;align-items:center;gap:8px;background:#fff0f0;border:1px solid #fca5a5;border-radius:8px;padding:6px 10px;font-size:12.5px;}
.hol-up-date{font-size:11.5px;font-weight:700;color:#dc2626;min-width:80px;}
.hol-up-name{flex:1;color:var(--tx);}
.hol-up-del{background:none;border:none;cursor:pointer;color:var(--err);font-size:13px;}
.hol-add{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
.hol-add input{padding:9px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;font-family:inherit;-webkit-appearance:none;outline:none;min-width:0;}
.hol-add input[type=date]{flex:1.2;} .hol-add input[type=text]{flex:2;}

/* Apt month cal cells */
.apt-month-cal{border:1.5px solid var(--bd);border-radius:var(--r);overflow:hidden;}
.apt-cal-cell{min-height:62px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:5px;cursor:pointer;position:relative;}
.apt-cal-cell:nth-child(7n){border-right:none;}
.apt-cal-cell.emp{background:var(--sur2);pointer-events:none;}
.apt-cal-cell.today-cell{background:#fffbeb;}
.apt-cal-daynum{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:3px;display:flex;align-items:center;gap:3px;}
.apt-pill{display:block;font-size:9.5px;font-weight:600;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.apt-pill.pending{background:#fef3c7;color:#92400e;} .apt-pill.confirmed{background:#d1fae5;color:#065f46;} .apt-pill.cancelled{background:#fee2e2;color:#991b1b;} .apt-pill.rescheduled{background:#ede9fe;color:#5b21b6;}
.apt-more{font-size:9px;color:var(--tx3);}
.day-apt-item{display:flex;align-items:flex-start;gap:9px;background:var(--sur2);border:1.5px solid var(--bd);border-radius:9px;padding:10px 12px;margin-bottom:7px;}
.day-apt-time{font-size:13px;font-weight:700;color:var(--primary);min-width:46px;}
.day-apt-info{flex:1;}
.day-apt-name{font-size:13.5px;font-weight:700;color:var(--tx);}
.day-apt-sub{font-size:12px;color:var(--tx3);margin-top:2px;}
.day-apt-actions{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.apt-view-btns{display:flex;border:1.5px solid var(--bd);border-radius:8px;overflow:hidden;}
.apt-vb{background:var(--sur);color:var(--tx2);border:none;padding:7px 14px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;}
.apt-vb.on{background:var(--primary);color:#fff;}

/* Detail popup */
#detail-content .sum-l{font-size:11px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
#detail-content .sum-v{font-size:14px;font-weight:600;color:var(--tx);}
#detail-content .sum-div{grid-column:1/-1;border:none;border-top:1.5px solid var(--bd);}

/* Vision boxes */
.vis-box-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:8px;}

/* Instructions editor */
.instr-editor textarea{min-height:90px;width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--r);font-size:14px;font-family:inherit;color:var(--tx);background:var(--sur2);outline:none;resize:vertical;}
.man-form{background:var(--sur2);border:1.5px solid var(--bd);border-radius:var(--R);padding:16px;margin-bottom:14px;}

/* LINE Guide */
.line-guide-box{border:1.5px solid #86efac;border-radius:var(--R);overflow:hidden;margin-bottom:16px;}
.line-guide-header{background:linear-gradient(135deg,#f0fdf4,#dcfce7);padding:13px 15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13.5px;font-weight:700;color:#14532d;user-select:none;}
.guide-arrow{transition:transform .3s;font-size:11px;}
.line-guide-body{padding:14px 16px;display:none;border-top:1.5px solid #86efac;}
.line-guide-body.open{display:block;}
.guide-step{display:flex;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px dashed var(--bd);}
.guide-step-num{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.guide-step-content{flex:1;}
.guide-step-title{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:5px;}
.guide-step-desc{font-size:12.5px;color:var(--tx2);line-height:1.7;margin-bottom:8px;}
.guide-sub-title{font-size:12.5px;font-weight:700;color:var(--tx2);margin:10px 0 5px;}
.guide-list{padding-left:16px;font-size:12.5px;color:var(--tx2);line-height:2;}
.guide-step-actions{display:flex;gap:7px;flex-wrap:wrap;margin:8px 0;}
.guide-link-btn{display:inline-flex;align-items:center;gap:5px;background:var(--primary);color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;}
.guide-link-btn-sm{display:inline-flex;align-items:center;gap:4px;background:var(--a2);color:var(--primary);border:1.5px solid var(--accent);padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;text-decoration:none;cursor:pointer;}
.guide-tip{background:#fffbeb;border-left:3px solid var(--warn);border-radius:0 7px 7px 0;padding:8px 10px;font-size:12px;color:#78350f;margin-top:7px;line-height:1.6;}
.guide-option-list{display:flex;flex-direction:column;gap:7px;margin:8px 0;}
.guide-option{background:var(--sur2);border:1.5px solid var(--bd);border-radius:8px;padding:10px 12px;}
.guide-option-name{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:3px;}
.guide-option-desc{font-size:12px;color:var(--tx2);line-height:1.5;}
.guide-code-box{background:#1e293b;border-radius:8px;padding:12px 14px;margin-top:10px;overflow-x:auto;}
.guide-code-title{font-size:11.5px;font-weight:700;color:#94a3b8;margin-bottom:7px;}
.guide-code{color:#e2e8f0;font-size:11px;font-family:'Courier New',monospace;white-space:pre;line-height:1.7;margin:0;}
.line-cfg-section{background:var(--sur2);border:1.5px solid var(--bd);border-radius:var(--r);padding:14px 15px;margin-bottom:12px;}
.line-cfg-title{font-size:13.5px;font-weight:700;color:var(--primary);margin-bottom:3px;}
.line-cfg-sub{font-size:12px;color:var(--tx3);line-height:1.6;}
code{background:#f1f5f9;border:1px solid var(--bd);padding:1px 5px;border-radius:4px;font-size:11.5px;color:var(--primary);font-family:'Courier New',monospace;}
/* Status bar */
.line-status-item{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--tx2);font-weight:500;}
.st-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.st-off{background:var(--bd);}
.st-on{background:var(--ok);box-shadow:0 0 0 3px rgba(34,197,94,0.2);}

/* Doc tag */
.doc-tag{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--primary),var(--pl));color:#fff;border-radius:20px;padding:4px 12px;font-size:12.5px;font-weight:600;}

/* Misc */
.hidden{display:none!important;} .mt14{margin-top:14px;} .mt20{margin-top:20px;}
.no-data{text-align:center;color:var(--tx3);padding:24px;font-size:14px;}
.sep{border:none;border-top:1.5px solid var(--bd);margin:16px 0;}
.freetext-input{width:100%;padding:11px 13px;border:1.5px solid var(--bd);border-radius:var(--r);font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none;}
.freetext-input:focus{border-color:var(--accent);}

/* ===== PRINT SLIP ===== */
.slip-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  background:linear-gradient(135deg,var(--primary),var(--pl));
  color:#fff;border:none;border-radius:10px;padding:11px 18px;
  font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;
  width:100%;margin-top:12px;transition:all .18s;
}
.slip-btn:active{transform:scale(.97);}
#ov-slip .pop{text-align:left;padding:20px 18px 28px;}
.slip-preview{
  border:2px solid var(--bd);border-radius:12px;overflow:hidden;
  background:#fff;margin-bottom:16px;
}
.slip-header{
  background:linear-gradient(135deg,var(--primary),var(--pl));
  color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;
}
.slip-header-logo{font-size:26px;flex-shrink:0;}
.slip-hosp{font-size:13px;font-weight:800;line-height:1.3;}
.slip-dept{font-size:11px;opacity:.8;margin-top:2px;}
.slip-title-row{
  background:#f0f6ff;padding:9px 18px;text-align:center;
  border-bottom:1.5px solid var(--bd);
}
.slip-title-txt{font-size:13.5px;font-weight:800;color:var(--primary);letter-spacing:.03em;}
.slip-confirmed-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:#dcfce7;color:#14532d;border-radius:20px;
  padding:3px 12px;font-size:11.5px;font-weight:700;margin-top:4px;
}
.slip-body{padding:14px 18px;display:flex;flex-direction:column;gap:0;}
.slip-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px dashed #e2e8f0;}
.slip-row:last-child{border-bottom:none;}
.slip-ic{font-size:17px;flex-shrink:0;width:24px;text-align:center;padding-top:1px;}
.slip-field{flex:1;}
.slip-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.slip-val{font-size:14px;font-weight:700;color:var(--tx);}
.slip-val.hl{font-size:16px;color:var(--primary);}
.slip-ref-area{
  background:linear-gradient(135deg,#f8faff,#f0f6ff);
  border-top:1.5px solid var(--bd);padding:12px 18px;text-align:center;
}
.slip-refcode{font-size:20px;font-weight:900;letter-spacing:.12em;color:var(--primary);font-family:'Courier New',monospace;}
.slip-reflbl{font-size:11px;color:var(--tx3);margin-top:3px;}
.slip-instr-area{
  background:linear-gradient(135deg,#f0fdf4,#dcfce7);
  border-top:1.5px solid #86efac;padding:12px 18px;
}
.slip-instr-area.surg-bg{background:linear-gradient(135deg,#faf5ff,#ede9fe);border-top-color:#c4b5fd;}
.slip-instr-title{font-size:12px;font-weight:700;color:#14532d;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.slip-instr-area.surg-bg .slip-instr-title{color:#5b21b6;}
.slip-instr-list{list-style:none;display:flex;flex-direction:column;gap:4px;}
.slip-instr-list li{font-size:11.5px;color:#374151;display:flex;align-items:flex-start;gap:5px;line-height:1.5;}
.slip-instr-list li::before{content:'•';font-weight:900;flex-shrink:0;}
.slip-instr-area .slip-instr-list li::before{color:var(--ok);}
.slip-instr-area.surg-bg .slip-instr-list li::before{color:var(--purple);}
.slip-footer-area{
  background:var(--primary);color:rgba(255,255,255,.9);
  padding:10px 18px;text-align:center;font-size:11px;line-height:1.7;
}

/* print buttons row */
.slip-act-row{display:flex;gap:10px;}

/* ===== @MEDIA PRINT ===== */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body>*{display:none!important;}
  #print-slip-area{display:block!important;position:fixed;inset:0;background:#fff;padding:6mm;}
  .slip-preview{border:1.5px solid #94a3b8;border-radius:8px;max-width:88mm;margin:0 auto;}
  .slip-header{background:var(--primary)!important;-webkit-print-color-adjust:exact!important;}
}

<body>

<header class="hdr">
  <div class="hdr-in">
    <div class="logo">
      <div class="logo-ic">👁️</div>
      <div class="logo-tx">
        <h1>ศูนย์ตรวจและรักษาสายตา รพ.กลาง</h1>
      </div>
    </div>
  </div>
</header>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="bnav-item on" id="bnav-book" onclick="showPage('book',this,'bnav-book')">

  </button>
</nav>

<div class="main">

<!-- ============ PAGE: BOOK ============ -->
<div id="pg-book" class="page on">
  <div class="hero">
    <div>
      <div class="hero-t">🌟 นัดหมายตรวจตาเพื่อทำเลสิก</div>
      <div class="hero-s">กรอกข้อมูล เลือกแพทย์ และเลือกวันนัดหมาย<br>เจ้าหน้าที่จะติดต่อกลับเพื่อยืนยันนัดหมาย</div>
    </div>
    <button class="hero-btn" style="width:100%;justify-content:center;" onclick="document.getElementById('f-anchor').scrollIntoView({behavior:'smooth'})">🏥 เริ่มนัดหมาย →</button>
  </div>

  <div class="stepper">
    <div class="stp act" id="s1"><div class="stp-n">1</div><div class="stp-l">ข้อมูลส่วนตัว</div></div>
    <div class="stp-line" id="ln1"></div>
    <div class="stp" id="s2"><div class="stp-n">2</div><div class="stp-l">แพทย์ & รูปแบบ</div></div>
    <div class="stp-line" id="ln2"></div>
    <div class="stp" id="s3"><div class="stp-n">3</div><div class="stp-l">เลือกวันนัด</div></div>
    <div class="stp-line" id="ln3"></div>
    <div class="stp" id="s4"><div class="stp-n">4</div><div class="stp-l">ยืนยัน</div></div>
  </div>

  <!-- STEP 1 -->
  <div id="fs1">
    <div class="card" id="f-anchor">
      <div class="card-t">👤 ข้อมูลส่วนตัว</div>
      <div class="fr fr2mob">
        <div class="fg" id="fg-nm"><label>ชื่อ-นามสกุล *</label><input id="f-nm" placeholder="กรอกชื่อ-นามสกุล"><span class="em">กรุณากรอกชื่อ-นามสกุล</span></div>
        <div class="fg" id="fg-ag"><label>อายุ (ปี) *</label><input id="f-ag" type="number" min="15" max="99" placeholder="อายุ"><span class="em">กรุณากรอกอายุ 15–99 ปี</span></div>
      </div>
      <div class="fr">
        <div class="fg" id="fg-ph"><label>เบอร์โทรศัพท์ *</label><input id="f-ph" type="tel" maxlength="10" placeholder="0xx-xxx-xxxx"><span class="em">กรุณากรอกเบอร์ 10 หลัก เริ่มด้วย 0</span></div>
        <div class="fg"><label>อีเมล (ถ้ามี)</label><input id="f-em" type="email" placeholder="email@example.com"></div>
      </div>

      <div class="card-t" style="margin-top:20px;">👓 ค่าสายตา</div>
      <div class="section-note" style="margin-bottom:14px;">กรอกค่าสายตาสั้นและค่าสายตาเอียงแยกกัน — สายตาสั้น: ใส่เครื่องหมายลบ เช่น -3.50 / สายตาเอียง: ใส่เครื่องหมายลบ เช่น -1.25 / หากไม่ทราบค่าให้เลือก "ไม่ทราบ"</div>

      <!-- ตาขวา -->
      <div style="background:var(--sur2);border:1.5px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;" id="fg-rv">
        <div style="font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;">👁️ ตาขวา (OD) *</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
          <div class="fg">
            <label>สายตาสั้น (SPH)</label>
            <select id="f-rv-sph-type" onchange="updVision('rv','sph')">
              <option value="">-- เลือก --</option>
              <option value="val">ระบุค่า</option>
              <option value="unknown">ไม่ทราบ</option>
              <option value="none">ไม่มี (0)</option>
            </select>
            <input id="f-rv-sph" type="number" step="0.25" placeholder="เช่น -3.50" class="hidden" style="margin-top:6px;">
          </div>
          <div class="fg">
            <label>สายตาเอียง (CYL)</label>
            <select id="f-rv-cyl-type" onchange="updVision('rv','cyl')">
              <option value="">-- เลือก --</option>
              <option value="val">ระบุค่า</option>
              <option value="unknown">ไม่ทราบ</option>
              <option value="none">ไม่มี (0)</option>
            </select>
            <input id="f-rv-cyl" type="number" step="0.25" placeholder="เช่น -1.25" class="hidden" style="margin-top:6px;">
          </div>
          <div class="fg">
            <label>แกน (Axis) °</label>
            <input id="f-rv-axis" type="number" step="1" min="0" max="180" placeholder="เช่น 90" style="opacity:0.5;" disabled>
          </div>
        </div>
        <span class="em" style="margin-top:4px;display:none;" id="rv-em">กรุณากรอกข้อมูลค่าสายตาขวา</span>
      </div>

      <!-- ตาซ้าย -->
      <div style="background:var(--sur2);border:1.5px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:4px;" id="fg-lv">
        <div style="font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;">👁️ ตาซ้าย (OS) *</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
          <div class="fg">
            <label>สายตาสั้น (SPH)</label>
            <select id="f-lv-sph-type" onchange="updVision('lv','sph')">
              <option value="">-- เลือก --</option>
              <option value="val">ระบุค่า</option>
              <option value="unknown">ไม่ทราบ</option>
              <option value="none">ไม่มี (0)</option>
            </select>
            <input id="f-lv-sph" type="number" step="0.25" placeholder="เช่น -3.50" class="hidden" style="margin-top:6px;">
          </div>
          <div class="fg">
            <label>สายตาเอียง (CYL)</label>
            <select id="f-lv-cyl-type" onchange="updVision('lv','cyl')">
              <option value="">-- เลือก --</option>
              <option value="val">ระบุค่า</option>
              <option value="unknown">ไม่ทราบ</option>
              <option value="none">ไม่มี (0)</option>
            </select>
            <input id="f-lv-cyl" type="number" step="0.25" placeholder="เช่น -1.25" class="hidden" style="margin-top:6px;">
          </div>
          <div class="fg">
            <label>แกน (Axis) °</label>
            <input id="f-lv-axis" type="number" step="1" min="0" max="180" placeholder="เช่น 90" style="opacity:0.5;" disabled>
          </div>
        </div>
        <span class="em" style="margin-top:4px;display:none;" id="lv-em">กรุณากรอกข้อมูลค่าสายตาซ้าย</span>
      </div>

      <div class="card-t" style="margin-top:20px;">🏥 โรคประจำตัว</div>
      <div class="chips" id="dis-grp">
        <label class="chip" onclick="togChip(this,'dis-grp')"><input type="checkbox" value="เบาหวาน">🩸 เบาหวาน</label>

          <div class="line-guide-body">

            <!-- STEP 1 -->
            <div class="guide-step">
              <div class="guide-step-num">1</div>
              <div class="guide-step-content">
                <div class="guide-step-title">สร้าง LINE Official Account</div>
                <div class="guide-step-desc">LINE OA คือบัญชีทางการของโรงพยาบาลบน LINE ผู้ป่วย Add เพื่อน แล้วรับข้อความได้</div>
                <div class="guide-step-actions">

                </div>
                <div class="guide-tip">💡 เลือกแผน <strong>Free</strong> → ส่งได้ 500 ข้อความ/เดือน หรือ <strong>Light 399 บาท/เดือน</strong> → ส่งได้ 5,000 ข้อความ</div>
              </div>
            </div>

            <!-- STEP 2 -->
            <div class="guide-step">
              <div class="guide-step-num">2</div>
              <div class="guide-step-content">
                <div class="guide-step-title">เปิด Messaging API และคัดลอก Channel Access Token</div>
                <ol class="guide-list">
                  <li>ไปที่ <a href="https://developers.line.biz/console/" target="_blank" style="color:var(--accent);">developers.line.biz/console</a> → Login ด้วยบัญชีเดียวกับ LINE OA</li>
                  <li>คลิก Provider → <strong>Create a Messaging API channel</strong> → เลือก OA ที่สร้างไว้</li>
                  <li>ใน Channel → แท็บ <strong>Messaging API</strong> → เลื่อนหา <strong>Channel access token</strong></li>
                  <li>คลิก <strong>"Issue"</strong> → คัดลอก Token ที่ได้ (ยาวประมาณ 170 ตัวอักษร)</li>
                  <li>วาง Token ในช่อง <strong>"Channel Access Token"</strong> ด้านล่าง</li>
                </ol>
                <div class="guide-tip">⚠️ อย่าแชร์ Token ให้ใคร — เปรียบเหมือนรหัสผ่านของ LINE OA</div>
              </div>
            </div>

            <!-- STEP 3 -->
            <div class="guide-step">
              <div class="guide-step-num">3</div>
              <div class="guide-step-content">
                <div class="guide-step-title">สร้าง Make Scenario สำหรับส่งข้อความ (ไม่ต้องเขียน Code!)</div>
                <div class="guide-step-desc">Make เป็นเครื่องมือ automation ฟรี ทำหน้าที่รับคำสั่งจากระบบนัดหมาย แล้วส่งต่อไปยัง LINE API</div>
                <div class="guide-step-actions">
                  <a href="https://www.make.com/en/register" target="_blank" class="guide-link-btn">🔗 สมัคร Make ฟรี</a>
                </div>
                <ol class="guide-list">
                  <li>หลัง Login → คลิก <strong>"Create a new scenario"</strong></li>
                  <li>คลิก <strong>"+"</strong> เพื่อเพิ่ม module แรก → ค้นหา <strong>"Webhooks"</strong> → เลือก <strong>"Custom webhook"</strong></li>
                  <li>คลิก <strong>"Add"</strong> → ตั้งชื่อ เช่น "LASIK LINE Notify" → คลิก <strong>"Save"</strong></li>
                  <li>Make จะให้ <strong>Webhook URL</strong> (ขึ้นต้นด้วย https://hook.eu2.make.com/...) → <strong>คัดลอกไว้ก่อน</strong></li>
                  <li>คลิก <strong>"+"</strong> เพิ่ม module ที่ 2 → ค้นหา <strong>"HTTP"</strong> → เลือก <strong>"Make a request"</strong></li>
                  <li>ตั้งค่า HTTP module ดังนี้:
                    <div class="guide-code-box" style="margin-top:8px;">
                      <div class="guide-code-title">⚙️ ค่าที่ต้องกรอกใน HTTP Module</div>
                      <pre class="guide-code">URL:     https://api.line.me/v2/bot/message/push
Method:  POST
Headers:
  Content-Type:  application/json
  Authorization: Bearer {{1.token}}

Body (Raw / JSON):
{
  "to": "{{1.to}}",
  "messages": [{
    "type": "text",
    "text": "{{1.message}}"
  }]
}</pre>
                    </div>
                  </li>
                  <li>คลิก <strong>"OK"</strong> → กด <strong>"Save"</strong> → เปิด Toggle <strong>"Scheduling"</strong> → เลือก <strong>"Immediately"</strong></li>
                  <li>วาง Webhook URL ที่ได้ในช่อง <strong>"Make Webhook URL"</strong> ด้านล่าง</li>
                </ol>
                <div class="guide-tip">💡 Make ฟรีได้ 1,000 operations/เดือน ≈ ส่งข้อความได้ 500-1,000 ครั้ง/เดือน</div>
              </div>
            </div>

            <!-- STEP 4 -->
            <div class="guide-step">
              <div class="guide-step-num">4</div>
              <div class="guide-step-content">
                <div class="guide-step-title">หา Group ID กลุ่มเจ้าหน้าที่</div>
                <ol class="guide-list">
                  <li>สร้างกลุ่ม LINE ของเจ้าหน้าที่ (ถ้ายังไม่มี)</li>
                  <li><strong>เพิ่ม LINE OA เข้ากลุ่ม</strong> โดยค้นหาชื่อ OA แล้วเพิ่มเป็นสมาชิก</li>
                  <li>ใครก็ได้ในกลุ่ม <strong>พิมพ์ข้อความใดก็ได้</strong> ส่งในกลุ่ม</li>
                  <li>ไปที่ Make → เปิด Scenario → ดู <strong>Webhook data</strong> ที่รับมา → หา field <code>source.groupId</code></li>
                  <li>หรือใช้ <strong>Get Group ID Tool</strong> ด้านล่าง → กรอก Token แล้วคลิก</li>
                </ol>
                <div class="guide-tip">💡 Group ID ขึ้นต้นด้วย <code>C</code> ตามด้วยตัวเลข 32 หลัก เช่น <code>C1234567890abcdef...</code></div>
              </div>
            </div>

            <!-- STEP 5 -->
            <div class="guide-step">
              <div class="guide-step-num">5</div>
              <div class="guide-step-content">
                <div class="guide-step-title">รับ User ID จากผู้ป่วย (สำหรับแจ้งเตือนรายบุคคล)</div>
                <div class="guide-step-desc">ผู้ป่วยต้อง <strong>Add เพื่อน LINE OA</strong> ก่อน ระบบจึงสามารถส่งข้อความหาได้</div>
                <div class="guide-sub-title">วิธีรับ User ID อัตโนมัติ:</div>
                <ol class="guide-list">
                  <li>ตั้ง <strong>Webhook URL ใน LINE Developers</strong> → Messaging API → Webhook URL → ใส่ URL ของ Make scenario</li>
                  <li>เปิด <strong>"Use webhook"</strong> → Verify</li>
                  <li>เมื่อผู้ป่วย Add OA และส่งข้อความ → Make ได้รับ event พร้อม <strong>userId</strong></li>
                  <li>บันทึก userId ไว้กับนัดหมายของผู้ป่วย (กรอกในช่อง User ID ตอนลงนัด)</li>
                </ol>
                <div class="guide-tip">💡 วิธีง่ายกว่า: สร้าง Rich Menu ให้ผู้ป่วยกด "ลงทะเบียน" → ส่งเบอร์โทร → ระบบจับคู่ userId กับนัดหมายอัตโนมัติ</div>
              </div>
            </div>

            <!-- STEP 6 -->
            <div class="guide-step" style="border-bottom:none;">
              <div class="guide-step-num" style="background:var(--ok);">✓</div>
              <div class="guide-step-content">

              </div>
            </div>

          </div>

function updVision(side, field) {
  const selId = `f-${side}-${field}-type`;
  const inpId = `f-${side}-${field}`;
  const axisId = `f-${side}-axis`;
  const v = document.getElementById(selId).value;
  const inp = document.getElementById(inpId);
  if (v === 'val') {
    inp.classList.remove('hidden');
    inp.focus();
  } else {
    inp.classList.add('hidden');
    inp.value = '';
  }
  // Enable axis only when CYL has a value
  if (field === 'cyl') {
    const axEl = document.getElementById(axisId);
    if (v === 'val') {
      axEl.disabled = false; axEl.style.opacity = '1';
    } else {
      axEl.disabled = true; axEl.style.opacity = '0.4'; axEl.value = '';
    }
  }
}
function getVisionObj(side) {
  function fld(f) {
    const t = document.getElementById(`f-${side}-${f}-type`).value;
    if (!t) return null; // not filled
    if (t === 'unknown') return 'ไม่ทราบ';
    if (t === 'none') return '0';
    const v = document.getElementById(`f-${side}-${f}`).value;
    return v !== '' ? v : null;
  }
  const sph = fld('sph'), cyl = fld('cyl');
  const axis = document.getElementById(`f-${side}-axis`).value;
  return { sph, cyl, axis };
}
function visionStr(obj) {
  if (!obj) return '-';
  let s = '';
  if (obj.sph !== null) s += `SPH ${obj.sph}`;
  if (obj.cyl !== null) s += (s ? ' / ' : '') + `CYL ${obj.cyl}`;
  if (obj.axis) s += ` Ax${obj.axis}°`;
  return s || '-';
}

// ==================== CHIPS ====================
function togChip(el, grpId) {
  setTimeout(() => {
    const cb = el.querySelector('input');
    el.classList.toggle('on', cb.checked);
    const val = cb.value;
    const grp = el.closest('.chips');

    // Handle "ไม่มี" mutual exclusion
    const noneVals = ['ไม่มีโรคประจำตัว', 'ไม่มียาประจำ'];
    const isNone = noneVals.includes(val);
    if (isNone && cb.checked) {
      grp.querySelectorAll('input').forEach(x => {
        if (x !== cb) { x.checked = false; x.parentElement.classList.remove('on'); }
      });
      // hide all extra inputs
      ['dis-other-wrap','med-other-wrap','med-named-wrap'].forEach(id => {
        const el2 = document.getElementById(id); if (el2) el2.classList.add('hidden');
      });
      return;
    }
    // Uncheck "none" if anything else selected
    if (cb.checked) {
      grp.querySelectorAll('input').forEach(x => {
        if (noneVals.includes(x.value)) { x.checked = false; x.parentElement.classList.remove('on'); }
      });
    }

    // Handle อื่นๆ (dis)
    if (val === '__other__' && cb.getAttribute('data-other') === 'dis') {
      document.getElementById('dis-other-wrap').classList.toggle('hidden', !cb.checked);
    }
    // Handle อื่นๆ (med)
    if (val === '__other__' && cb.getAttribute('data-other') === 'med') {
      document.getElementById('med-other-wrap').classList.toggle('hidden', !cb.checked);
    }
    // Handle ยาโรคประจำตัว name
    if (val === 'ยาโรคประจำตัว') {
      document.getElementById('med-named-wrap').classList.toggle('hidden', !cb.checked);
    }
  }, 0);
}

function getChips(grpId) {
  const vals = [];
  document.querySelectorAll('#' + grpId + ' input:checked').forEach(x => {
    if (x.value === '__other__') {
      const other = x.getAttribute('data-other');
      if (other === 'dis') {
        const txt = document.getElementById('dis-other-txt').value.trim();
        if (txt) vals.push('อื่นๆ: ' + txt);
      } else if (other === 'med') {
        const txt = document.getElementById('med-other-txt').value.trim();
        if (txt) vals.push('อื่นๆ: ' + txt);
      }
    } else if (x.value === 'ยาโรคประจำตัว') {
      const named = document.getElementById('med-named-txt').value.trim();
      vals.push(named ? `ยาโรคประจำตัว (${named})` : 'ยาโรคประจำตัว');
    } else {
      vals.push(x.value);
    }
  });
  return vals;
}

  // Vision: each eye needs at least SPH filled

  document.getElementById('fg-rv').style.borderColor=rvOk?'var(--bd)':'var(--err)';

  document.getElementById('fg-lv').style.borderColor=lvOk?'var(--bd)':'var(--err)';

  return true;
}

// ==================== AVAILABILITY ====================
function isAvDay(d){
  const today=new Date();today.setHours(0,0,0,0);
  if(d<today||isHol(d))return false;
  const dow=d.getDay(),w=wom(d),doc=S.doc,type=S.type;
  if(dow===0||dow===2)return false;
  if(dow===6){
    if(type==='ตรวจเช้าผ่าตัดเย็น')return false;
    if(doc!==''&&doc!=='ไม่ระบุแพทย์')return false;
    return[1,2,4,5].includes(w);
  }
  if(dow===1)return doc==='พ.เมธินี'||doc==='ไม่ระบุแพทย์';
  if(dow===3){
    if(doc==='พ.เอกอนันต์')return true;
    if(doc==='พ.นพมาศ')return[1,3,5].includes(w);
    return doc==='ไม่ระบุแพทย์';
  }
  if(dow===4)return doc==='พ.นพมาศ'||doc==='ไม่ระบุแพทย์';
  if(dow===5)return doc==='พ.นพมาศ'||doc==='พ.เมธินี'||doc==='ไม่ระบุแพทย์';
  return false;
}

// ==================== CALENDAR ====================
function buildCal(){renderCal();}
function renderCal(){
  const yr=S.calY,mo=S.calM;
  document.getElementById('cal-mo').textContent=`${THM[mo]} ${yr+543}`;
  const tag=document.getElementById('cal-doctag');
  tag.innerHTML=S.doc?`<div class="doc-tag">👨‍⚕️ ${S.doc} — ${S.type}</div>`:'';
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  THDs.forEach(d=>{const e=document.createElement('div');e.className='cal-dn';e.textContent=d;grid.appendChild(e);});
  const fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const hols=DB.H(),holEn=DB.hEn();
  for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='cal-d emp';grid.appendChild(e);}
  for(let day=1;day<=dim;day++){
    const d=new Date(yr,mo,day),dateStr=ds(d);
    const isToday=d.getTime()===today.getTime(),isPast=d<today;
    const isH=holEn&&hols.some(h=>h.d===dateStr),isSun=d.getDay()===0;
    const av=!isPast&&!isSun&&!isH&&isAvDay(d),isSel=S.date===dateStr;
    const el=document.createElement('div');
    let cls='cal-d';
    if(isH)cls+=' hol';
    else if(isSun||isPast||!av)cls+=' na';
    else cls+=' av';
    if(isSel)cls+=' sel';
    if(isToday)cls+=' tod';
    el.className=cls;
    el.innerHTML=`<div class="dn">${day}</div><div class="dot"></div>`;
    if(av)el.onclick=()=>selDate(dateStr,el);
    grid.appendChild(el);
  }
}
function chMo(d){
  S.calM+=d;
  if(S.calM<0){S.calM=11;S.calY--;}
  if(S.calM>11){S.calM=0;S.calY++;}
  S.date=null;renderCal();document.getElementById('slot-sec').classList.add('hidden');
}
function selDate(dateStr,el){
  S.date=dateStr;
  document.querySelectorAll('.cal-d.sel').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
  renderSlot(dateStr);
  document.getElementById('slot-sec').classList.remove('hidden');
}
function renderSlot(dateStr){
  // ALWAYS 07:30 only
  const cnt=cntSlot(dateStr,'07:30');
  const max=qMax(dateStr,'0730');
  const full=cnt>=max,pct=Math.round(cnt/max*100);
  const bc=full?'bar-f':pct>=60?'bar-w':'bar-ok';
  const st=full?`⛔ เต็มแล้ว (${cnt}/${max})`:pct>=60?`⚠️ เหลือ ${max-cnt} คิว`:`✅ ว่าง ${max-cnt} คิว`;
  const sc=full?'st-f':pct>=60?'st-w':'st-ok';
  S.time='07:30';
  document.getElementById('slot-box').innerHTML=`
    <div class="ts-box sel" id="ts-730">
      <div class="ts-t">🕐 07:30 น.</div>
      <div class="ts-tag">ในเวลาราชการ</div>
      <div style="font-size:13px;color:var(--tx2);margin-bottom:10px;">${S.type==='ตรวจเช้าผ่าตัดเย็น'?'ตรวจเช้าผ่าตัดเย็น':'ตรวจอย่างเดียว'}</div>
      <div class="ts-bar-w"><div class="ts-bar ${bc}" style="width:${Math.min(pct,100)}%"></div></div>
      <div class="ts-ct">${cnt}/${max} คิว</div>
      <div class="ts-st ${sc}">${st}</div>
    </div>
    ${full?'<div class="alert a-err" style="margin-top:12px;">⛔ ช่วงเวลานี้เต็มแล้ว กรุณาเลือกวันอื่น</div>':''}`;
  if(full)S.date=null;
}

function openSlip(id) {
  const a = DB.A().find(x => x.id === id);
  if (!a || a.status !== 'confirmed') return;
  currentSlipId = id;
  document.getElementById('slip-content').innerHTML = buildSlipHTML(a);
  document.getElementById('ov-slip').classList.add('on');
}

function closeSlip() {
  document.getElementById('ov-slip').classList.remove('on');
  currentSlipId = '';
}

function doPrint() {
  const a = DB.A().find(x => x.id === currentSlipId);
  if (!a) return;
  const printArea = document.getElementById('print-slip-area');
  printArea.innerHTML = buildSlipHTML(a, true);
  printArea.style.display = 'block';
  setTimeout(() => {
    window.print();
    setTimeout(() => { printArea.style.display = 'none'; }, 1000);
  }, 200);
}

📞 สอบถาม/เลื่อนนัด: 02-xxx-xxxx`;

  if (navigator.share) {
    try {
      await navigator.share({ title: 'ใบนัดหมาย รพ.กลาง', text });
    } catch(e) {
      if (e.name !== 'AbortError') copyToClipboard(text);
    }
  } else {
    copyToClipboard(text);
  }
}

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('📋 คัดลอกข้อมูลใบนัดแล้ว');
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('📋 คัดลอกข้อมูลใบนัดแล้ว');
}
function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:24px;font-size:14px;font-weight:600;z-index:9999;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.25);';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

/* ---- Core send function — POST to Make webhook ---- */
async function sendViaProxy(token, to, message){
  /*
   * Make Scenario รับ JSON body:
   *   { token: "...", to: "groupId or userId", message: "..." }
   * Make ส่งต่อไปยัง LINE API:
   *   POST https://api.line.me/v2/bot/message/push
   *   Authorization: Bearer {token}
   *   Body: { to, messages:[{type:"text",text:message}] }
   */
  const c=lnCfg();
  if(!c.proxyUrl||!c.channelToken){
    return{ok:false,reason:'no_config'};
  }
  try{
    const res=await fetch(c.proxyUrl,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:c.channelToken,to,message})
    });
    const text=await res.text().catch(()=>'');
    return{ok:res.ok,status:res.status,body:text};
  }catch(e){
    return{ok:false,reason:e.message};
  }
}

function buildMsg(template,apt){
  const[y,m,d]=(apt.date||'').split('-').map(Number);
  const dObj=new Date(y,m-1,d);
  const dStr=`วัน${THDl[dObj.getDay()]}ที่ ${d} ${THM[m-1]} ${y+543}`;
  return template
    .replace(/{ชื่อ}/g,apt.nm||apt.name||'-')
    .replace(/{อายุ}/g,apt.ag||apt.age||'-')
    .replace(/{เบอร์}/g,apt.ph||apt.phone||'-')
    .replace(/{วันนัด}/g,dStr)
    .replace(/{เวลา}/g,apt.time||'-')
    .replace(/{แพทย์}/g,apt.doc||apt.doctor||'-')
    .replace(/{รูปแบบ}/g,apt.type||apt.aptType||'-')
    .replace(/{รหัส}/g,apt.id||'-');
}

async function notifyStaffNewApt(apt){
  const c=lnCfg();
  if(!c.staffEn||!c.groupId||!c.channelToken||!c.proxyUrl)return;
  const defMsg=`🔔 นัดหมายใหม่ — รพ.กลาง\n👤 {ชื่อ} | อายุ {อายุ} ปี\n📞 {เบอร์}\n📅 {วันนัด} เวลา {เวลา} น.\n👨‍⚕️ {แพทย์} · {รูปแบบ}\n🆔 {รหัส} | ⏳ รอยืนยัน`;
  const msg=buildMsg(c.msgStaff||defMsg,apt);
  const r=await sendViaProxy(c.channelToken,c.groupId,msg);
  console.log('Staff LINE notify:',r.ok?'✅':'❌',r.reason||r.status||'');
}

async function testLineAPI(){
  saveLineSettings();
  const c=lnCfg();
  const ok=document.getElementById('line-ok'),err=document.getElementById('line-err');
  ok.classList.add('hidden');err.classList.add('hidden');
  if(!c.channelToken){err.textContent='⚠️ กรุณากรอก Channel Access Token';err.classList.remove('hidden');return;}
  if(!c.proxyUrl){err.textContent='⚠️ กรุณากรอก Make Webhook URL';err.classList.remove('hidden');return;}
  if(!c.groupId){err.textContent='⚠️ กรุณากรอก Group ID กลุ่มเจ้าหน้าที่';err.classList.remove('hidden');return;}
  ok.textContent='📨 กำลังส่งข้อความทดสอบ...';ok.classList.remove('hidden');
  const testMsg=`🧪 ทดสอบระบบ LINE OA\nศูนย์ตรวจและรักษาสายตา โรงพยาบาลกลาง\n✅ ระบบเชื่อมต่อสำเร็จ!\n🕐 ${new Date().toLocaleString('th-TH')}`;
  const r=await sendViaProxy(c.channelToken,c.groupId,testMsg);
  if(r.ok){
    ok.textContent='✅ ส่งสำเร็จ! ตรวจสอบข้อความในกลุ่ม LINE เจ้าหน้าที่';
  }else if(r.reason==='no_config'){
    ok.classList.add('hidden');
    err.textContent='⚠️ กรุณากรอก Token และ Webhook URL ก่อน';err.classList.remove('hidden');

async function sendBatchReminder(){
  const dateStr=document.getElementById('line-remind-date').value;
  if(!dateStr){alert('กรุณาเลือกวันที่');return;}
  const c=lnCfg();
  const resEl=document.getElementById('line-remind-result');
  if(!c.channelToken||!c.proxyUrl){
    resEl.innerHTML='<div class="alert a-warn">⚠️ กรุณาบันทึก Channel Token และ Webhook URL ก่อน</div>';return;
  }
  const apts=DB.A().filter(a=>a.date===dateStr&&a.status!=='cancelled');
  if(!apts.length){resEl.innerHTML='<div class="alert a-info">ไม่มีนัดหมายในวันที่เลือก</div>';return;}
  const[y,m,d]=dateStr.split('-').map(Number);
  const dObj=new Date(y,m-1,d);
  const dDisp=`วัน${THDl[dObj.getDay()]}ที่ ${d} ${THM[m-1]} ${y+543}`;
  const tmpl=document.getElementById('line-msg-patient').value||c.msgPatient||'🏥 แจ้งเตือนนัดหมาย\nคุณ{ชื่อ} นัดวันที่ {วันนัด} เวลา {เวลา} น.';
  resEl.innerHTML=`<div class="alert a-info" style="margin-bottom:10px;" id="batch-summary">📨 กำลังส่ง ${apts.length} ราย สำหรับ ${dDisp}...</div><div id="batch-rows"></div>`;
  const batchEl=document.getElementById('batch-rows');
  let sent=0,failed=0,noId=0;
  for(const a of apts){
    const userId=a.lineUserId||'';
    const msg=buildMsg(tmpl,a);
    let icon='',statusText='';
    if(!userId){
      noId++;icon='⚠️';statusText='ไม่มี User ID';
    }else{
      const r=await sendViaProxy(c.channelToken,userId,msg);
      if(r.ok){sent++;icon='✅';statusText='ส่งสำเร็จ';}
      else{failed++;icon='❌';statusText=`ส่งไม่สำเร็จ (${r.reason||r.status})`;}
    }
    batchEl.innerHTML+=`<div style="display:flex;justify-content:space-between;align-items:center;background:var(--sur2);border:1px solid var(--bd);border-radius:8px;padding:9px 12px;margin-bottom:5px;">
      <div>
        <div style="font-size:13.5px;font-weight:700;">${a.nm||a.name||'-'}</div>
        <div style="font-size:12px;color:var(--tx3);">${a.ph||a.phone||'-'} · ${a.time} น.</div>
      </div>
      <span style="font-size:12px;font-weight:700;${noId&&icon==='⚠️'?'color:var(--warn)':sent&&icon==='✅'?'color:var(--ok)':'color:var(--err)'}">${icon} ${statusText}</span>
    </div>`;
  }
  document.getElementById('batch-summary').innerHTML=`📊 ผลการส่ง: ✅ สำเร็จ ${sent} · ❌ ล้มเหลว ${failed} · ⚠️ ไม่มี User ID ${noId} (รวม ${apts.length} ราย)`;
}

function openRes(id){resId=id;document.getElementById('ov-res').classList.add('on');}

function doReschedule(){
  const newDt=document.getElementById('res-dt').value;

  if(!newDt){alert('กรุณาเลือกวันที่ใหม่');return;}
  const a=DB.A(),apt=a.find(x=>x.id===resId);
  if(apt){
    apt.prevDate=apt.date;apt.prevTime=apt.time;
    apt.date=newDt;apt.time=newTm;
    apt.status='rescheduled';
    apt.note=(apt.note||'')+` [เลื่อนนัด${reason?': '+reason:''}]`;
  }
  DB.sA(a);closeRes();renderTbl();renderAptCal();
  document.getElementById('res-dt').value='';document.getElementById('res-reason').value='';
}

function renderQM(){
  const dateStr=document.getElementById('qm-date').value||ds(new Date());
  const q=DB.Q();
  const cfg=q[dateStr]||{};
  // slot 0730
  const max730=(cfg['0730'])||5;
  const open730=cfg['open0730']!==false;
  document.getElementById('qm-0730').textContent=max730;
  document.getElementById('qm-tog-0730').checked=open730;
  document.getElementById('qm-badge-0730').textContent=open730?'เปิดให้บริการ':'ปิดให้บริการ';
  document.getElementById('qm-card-0730').classList.toggle('closed',!open730);
  const used730=cntSlot(dateStr,'07:30');
  document.getElementById('qm-0730-used').textContent=`(ใช้แล้ว ${used730}/${max730})`;
  // slot 1400
  const max1400=(cfg['1400'])||5;
  const open1400=cfg['open1400']!==false;
  document.getElementById('qm-1400').textContent=max1400;
  document.getElementById('qm-tog-1400').checked=open1400;
  document.getElementById('qm-badge-1400').textContent=open1400?'เปิดให้บริการ':'ปิดให้บริการ';

}
function togSlot(slot){
  const dateStr=document.getElementById('qm-date').value||ds(new Date());
  const q=DB.Q();
  if(!q[dateStr])q[dateStr]={};
  const isOpen=document.getElementById('qm-tog-'+slot).checked;
  q[dateStr]['open'+slot]=isOpen;
  DB.sQ(q);renderQM();
}
function adjQ(slot,delta){
  const dateStr=document.getElementById('qm-date').value||ds(new Date());
  const q=DB.Q();
  if(!q[dateStr])q[dateStr]={};
  const cur=(q[dateStr][slot])||5;
  q[dateStr][slot]=Math.max(1,Math.min(20,cur+delta));
  DB.sQ(q);renderQM();
}

// ==================== HOLIDAY CALENDAR ====================
let holCalY=new Date().getFullYear(), holCalM=new Date().getMonth();
function chHolMo(d){holCalM+=d;if(holCalM<0){holCalM=11;holCalY--;}if(holCalM>11){holCalM=0;holCalY++;}renderHolCal();}

function renderHolCal(){
  const yr=holCalY,mo=holCalM;
  const titleEl=document.getElementById('hol-cal-title');
  if(titleEl)titleEl.textContent=`${THM[mo]} ${yr+543}`;
  const grid=document.getElementById('hol-cal-grid');
  if(!grid)return;
  grid.innerHTML='';
  const hols=DB.H();
  const today=new Date();today.setHours(0,0,0,0);
  THDs.forEach(d=>{const e=document.createElement('div');e.className='hol-cal-dn';e.textContent=d;grid.appendChild(e);});
  const fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='hol-cal-d emp';grid.appendChild(e);}
  for(let day=1;day<=dim;day++){
    const d=new Date(yr,mo,day),dateStr=ds(d);
    const isH=hols.some(h=>h.d===dateStr),isToday=d.getTime()===today.getTime();
    const el=document.createElement('div');
    let cls='hol-cal-d';
    if(isH)cls+=' hol-day-on';
    if(isToday)cls+=' today-hol';
    el.className=cls;
    el.textContent=day;
    el.title=isH?(hols.find(h=>h.d===dateStr)||{n:''}).n:'คลิกเพื่อเพิ่มวันหยุด';
    el.onclick=()=>togHolDay(dateStr,el);
    grid.appendChild(el);
  }
  renderHolUpcoming();
  const cntEl=document.getElementById('hol-cnt');
  if(cntEl)cntEl.textContent=hols.length;
}

function togHolDay(dateStr,el){
  const hols=DB.H();
  const idx=hols.findIndex(h=>h.d===dateStr);
  if(idx>=0){
    if(confirm(`ลบวันหยุด "${hols[idx].n}" วันที่ ${dateStr}?`)){hols.splice(idx,1);DB.sH(hols);renderHolCal();}
  } else {
    const[y,m,d]=dateStr.split('-').map(Number);
    const dObj=new Date(y,m-1,d);
    const nm=prompt(`เพิ่มวันหยุดวันที่ ${d} ${THM[m-1]} ${y+543}\nระบุชื่อวันหยุด:`,'');
    if(nm&&nm.trim()){hols.push({d:dateStr,n:nm.trim()});DB.sH(hols);renderHolCal();}
  }
}

function renderHolUpcoming(){
  const hols=DB.H().filter(h=>h.d>=ds(new Date())).sort((a,b)=>a.d.localeCompare(b.d)).slice(0,10);
  const el=document.getElementById('hol-upcoming');
  if(!el)return;
  el.innerHTML=hols.length?hols.map((h,i)=>{
    const[y,m,d]=h.d.split('-').map(Number);
    const dObj=new Date(y,m-1,d);
    return`<div class="hol-up-item">
      <span class="hol-up-date">${THDs[dObj.getDay()]} ${d} ${THM[m-1].slice(0,3)} ${y+543}</span>
      <span class="hol-up-name">🎌 ${h.n}</span>
      <button class="hol-up-del" onclick="delHolByDate('${h.d}')">✕</button>
    </div>`;
  }).join(''):'<div style="color:var(--tx3);font-size:13px;padding:8px 0;">ไม่มีวันหยุดที่กำลังจะมาถึง</div>';
}

function delHolByDate(dateStr){
  const hols=DB.H();
  const idx=hols.findIndex(h=>h.d===dateStr);
  if(idx>=0){hols.splice(idx,1);DB.sH(hols);renderHolCal();}
}

function renderHolGrid(){renderHolCal();}
function addHol(){
  const d=document.getElementById('hol-nd').value,n=document.getElementById('hol-nn').value.trim();
  if(!d){alert('กรุณาเลือกวันที่');return;}
  if(!n){alert('กรุณากรอกชื่อวันหยุด');return;}

  document.getElementById('hol-nd').value='';document.getElementById('hol-nn').value='';
  renderHolCal();
}
